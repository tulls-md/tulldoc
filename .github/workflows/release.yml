name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm auth
        run: npm config set "//registry.npmjs.org/:_authToken" "${{ secrets.NPM_TOKEN }}"

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Release: Version Packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  backmerge:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open back-merge PR (main → develop)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh pr list --base develop --head main --state open --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "Back-merge PR already open, skipping."
            exit 0
          fi
          gh pr create --base develop --head main \
            --title "chore: back-merge main into develop after release" \
            --body "Автоматический back-merge релизных изменений (версии и changelog) из main в develop."

  gate-docs:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for pending changesets
        id: gate
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$pending" -eq 0 ]; then
            echo "No pending changesets → deploy docs."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pending changesets ($pending) → release in progress, skip docs."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-docs:
    needs: gate-docs
    if: needs.gate-docs.outputs.deploy == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/deploy-docs.yml
